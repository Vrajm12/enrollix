[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/.next"
  functions = "frontend/functions"

[build.environment]
  NODE_VERSION = "22.22.0"

[[redirects]]
  from = "/api/*"
  to = "https://enrollix.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env.production]
  [env.production.build]
    command = "cd frontend && npm install && npm run build"

