services:
  - type: web
    name: enrollix-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run prisma:generate && npm run build
    startCommand: cd backend && node dist/index.js
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: enrollix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://enrollix-frontend.vercel.app

databases:
  - name: enrollix-db
    plan: free
    region: oregon
    databaseName: education_crm
    user: postgres
    ipAllowList: []
